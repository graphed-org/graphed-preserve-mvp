name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CORE: "graphed-core @ git+https://github.com/graphed-org/graphed-core@main"
  FRONTEND: "graphed @ git+https://github.com/graphed-org/graphed@main"
  AWKWARD: "graphed-awkward @ git+https://github.com/graphed-org/graphed-awkward@main"
  CHECKPOINT: "graphed-checkpoint @ git+https://github.com/graphed-org/graphed-checkpoint@main"
  CORPUS: "graphed-corpus @ git+https://github.com/graphed-org/graphed-corpus@main"

jobs:
  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps + this package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.CORE }}" "${{ env.FRONTEND }}" "${{ env.AWKWARD }}"
          python -m pip install "${{ env.CHECKPOINT }}" "${{ env.CORPUS }}"
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy (strict)
        run: mypy
      - name: Pytest + coverage gate (>=90%)
        run: pytest tests/frozen --cov=graphed_preserve --cov-branch --cov-report=term-missing

  # Free-threaded / bleeding-edge Pythons (plan A.5): genuinely exercises concurrency under no-GIL.
  # Experimental + non-blocking (awkward wheels may lag on 3.14 / 3.14t).
  test-experimental:
    name: test (experimental) py${{ matrix.python }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14", "3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.CORE }}" "${{ env.FRONTEND }}" "${{ env.AWKWARD }}"
          python -m pip install "${{ env.CHECKPOINT }}" "${{ env.CORPUS }}"
          python -m pip install -e ".[dev]"
          pytest tests/frozen

  docs:
    name: docs (sphinx -W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - shell: bash
        run: |
          python -m pip install --upgrade pip
          # pre-install the git siblings so the runtime deps resolve (they are not on PyPI);
          # PyPI deps (awkward/numpy/correctionlib/onnx/onnxruntime) come via [docs] -> the project.
          python -m pip install "${{ env.CORE }}" "${{ env.FRONTEND }}" "${{ env.AWKWARD }}"
          python -m pip install "${{ env.CHECKPOINT }}"
          python -m pip install -e ".[docs]"
          sphinx-build -W -b html docs docs/_build/html
