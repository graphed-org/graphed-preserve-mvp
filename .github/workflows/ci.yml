name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CORE: "graphed-core @ git+https://github.com/graphed-org/graphed-core-mvp@main"
  FRONTEND: "graphed @ git+https://github.com/graphed-org/graphed-mvp@main"
  AWKWARD: "graphed-awkward @ git+https://github.com/graphed-org/graphed-awkward-mvp@main"
  CHECKPOINT: "graphed-checkpoint @ git+https://github.com/graphed-org/graphed-checkpoint-mvp@main"
  CORPUS: "graphed-corpus @ git+https://github.com/graphed-org/graphed-corpus-mvp@main"
  HISTO: "graphed-histogram @ git+https://github.com/graphed-org/graphed-histogram-mvp@main"

jobs:
  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps + this package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.CORE }}" "${{ env.FRONTEND }}" "${{ env.AWKWARD }}"
          python -m pip install "${{ env.CHECKPOINT }}" "${{ env.CORPUS }}" "${{ env.HISTO }}"
          python -m pip install -e ".[dev]"
      # the ML plugins are part of the package: the BASE suite installs the frameworks so the
      # m26 framework tier runs (and coverage is accurate) on every cell that can install them.
      - name: Install ML frameworks (full)
        if: runner.os != 'Windows' && matrix.python != '3.14'
        run: python -m pip install -e ".[mltest]"
      - name: Install the OpenMP runtime xgboost links against (macOS)
        if: runner.os == 'macOS' && matrix.python != '3.14'
        run: brew install libomp
      - name: Install ML frameworks (windows - tensorflow ships no native wheels)
        if: runner.os == 'Windows' && matrix.python != '3.14'
        run: python -m pip install torch xgboost jax "tritonclient[http]"
      - uses: astral-sh/setup-uv@v5
      - name: Lint + types (pre-commit hooks via prek)
        run: uvx prek@0.4.5 run --all-files --show-diff-on-failure
      - name: Pytest + coverage gate (>=90%)
        if: runner.os != 'Windows' && matrix.python != '3.14'
        run: pytest tests/frozen --cov=graphed_preserve --cov-branch --cov-report=term-missing
      # Framework-INCOMPLETE cells (3.14: no cp314 wheels yet; windows: tensorflow ships no
      # native wheels) run the FULL suite without the coverage MEASUREMENT - the gate (still
      # 90) is enforced on the nine framework-complete cells and the everything-present
      # triton job, where the plugin evaluators can actually execute.
      - name: Pytest (framework-incomplete cell - suite only)
        if: runner.os == 'Windows' || matrix.python == '3.14'
        run: pytest tests/frozen

  # Free-threaded / bleeding-edge Pythons (plan A.5): genuinely exercises concurrency under no-GIL.
  # Experimental + non-blocking (awkward wheels may lag on 3.14 / 3.14t).
  test-experimental:
    name: test (experimental) py${{ matrix.python }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.CORE }}" "${{ env.FRONTEND }}" "${{ env.AWKWARD }}"
          python -m pip install "${{ env.CHECKPOINT }}" "${{ env.CORPUS }}" "${{ env.HISTO }}"
          python -m pip install -e ".[dev]"
          pytest tests/frozen

  docs:
    name: docs (sphinx -W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - shell: bash
        run: |
          python -m pip install --upgrade pip
          # pre-install the git siblings so the runtime deps resolve (they are not on PyPI);
          # PyPI deps (awkward/numpy/correctionlib/onnx/onnxruntime) come via [docs] -> the project.
          python -m pip install "${{ env.CORE }}" "${{ env.FRONTEND }}" "${{ env.AWKWARD }}"
          python -m pip install "${{ env.CHECKPOINT }}"
          python -m pip install -e ".[docs]"
          sphinx-build -W -b html docs docs/_build/html

  # Reproduce a preservation bundle through a REAL NVIDIA Triton server, over gRPC AND HTTP
  # (the fully-realistic External-plugin test). The container serves tests/samples/triton_models.
  triton:
    name: real triton server (grpc + http)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Start Triton server with the example model
        run: |
          docker run -d --rm --name triton -p 8000:8000 -p 8001:8001 -p 8002:8002 \
            -v ${{ github.workspace }}/tests/samples/triton_models:/models \
            nvcr.io/nvidia/tritonserver:25.11-pyt-python-py3 \
            tritonserver --model-repository=/models
      - name: Install deps + this package + ALL ML frameworks + triton client (grpc + http)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.CORE }}" "${{ env.FRONTEND }}" "${{ env.AWKWARD }}"
          python -m pip install "${{ env.CHECKPOINT }}" "${{ env.CORPUS }}" "${{ env.HISTO }}"
          python -m pip install -e ".[dev,mltest]" "tritonclient[all]"
      - name: Wait for Triton to be ready
        run: |
          for i in $(seq 1 90); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' localhost:8000/v2/health/ready)" = "200" ]; then
              echo "triton ready after ${i} tries"; exit 0
            fi
            sleep 2
          done
          echo "triton did not become ready"; docker logs triton; exit 1
      # the everything-present cell: live server (m9 grpc+http AND m26 default-transport live
      # tests) + every ML framework - the FULL suite runs together and NOTHING in m26 may skip.
      - name: Full frozen suite against real Triton (gRPC + HTTP) with all frameworks
        env:
          GRAPHED_TRITON_GRPC: localhost:8001
          GRAPHED_TRITON_HTTP: localhost:8000
          TRITON_SERVER_URL: localhost:8000
        run: |
          pytest tests/frozen --cov=graphed_preserve --cov-branch
          pytest tests/frozen/m26 -q -rs | tee m26run.txt
          ! grep -i "skipped" m26run.txt || (echo "m26 skipped tests on the everything-present cell" && exit 1)
      - name: Triton logs (on failure)
        if: failure()
        run: docker logs triton || true
